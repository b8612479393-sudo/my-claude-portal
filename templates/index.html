<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Claude Chat</title>
<style>
body { font-family: sans-serif; max-width: 800px; margin: 30px auto; padding: 20px; background: #111; color: #eee; }
h1 { text-align: center; }
#chat { border: 1px solid #444; padding: 20px; margin-bottom: 20px; min-height: 300px; background: #222; border-radius: 10px; }
.user { color: #6af; margin: 15px 0; }
.assistant { color: #6f6; margin: 15px 0; }
form { display: flex; gap: 10px; }
input[type=text] { flex: 1; padding: 12px; font-size: 16px; background: #222; color: #fff; border: 1px solid #444; border-radius: 5px; }
button { padding: 12px 24px; font-size: 16px; background: #e94560; color: #fff; border: none; border-radius: 5px; cursor: pointer; }
</style>
</head>
<body>
<h1>Claude Chat</h1>
<div id="chat">
{% for msg in history %}
<div class="{{ msg.role }}">
<b>{{ 'Вы' if msg.role == 'user' else 'Claude' }}:</b> {{ msg.content }}
</div>
{% endfor %}
</div>
<form method="post">
<input type="text" name="message" placeholder="Введите сообщение..." autocomplete="off" autofocus>
<button type="submit">Отправить</button>
</form>
</body>
</html>
